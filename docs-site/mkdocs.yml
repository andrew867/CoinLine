# CoinLine Payphone Management Platform — documentation site
site_name: CoinLine Payphone Management Platform
site_description: OEM-grade server-hosted fleet management for Millennium payphones — CoinLine Server, Management Console, API, and field validation.
site_url: http://127.0.0.1:8000
repo_url: https://github.com/andrew867/CoinLine
repo_name: CoinLine

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - toc:
      permalink: true
  - md_in_html

