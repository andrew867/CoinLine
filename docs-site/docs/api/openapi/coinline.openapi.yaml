openapi: 3.0.1
info:
  title: Host Platform API
  version: v1
paths:
  /api/audit/events:
    get:
      tags:
        - Audit
      parameters:
        - name: terminalId
          in: query
          schema:
            type: string
            format: uuid
        - name: category
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
        - name: sort
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/call-records:
    get:
      tags:
        - CallRecords
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
    post:
      tags:
        - CallRecords
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCallRecordDto'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateCallRecordDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateCallRecordDto'
      responses:
        '200':
          description: OK
  '/api/call-records/{id}':
    get:
      tags:
        - CallRecords
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/call-records/{id}/reconcile':
    post:
      tags:
        - CallRecords
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconcileDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ReconcileDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ReconcileDto'
      responses:
        '200':
          description: OK
  /api/cards/simulation-state:
    get:
      tags:
        - Cards
      summary: Advertises simulation gates for UI banners — safe without secrets.
      responses:
        '200':
          description: OK
  /api/cards/products:
    get:
      tags:
        - Cards
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
    post:
      tags:
        - Cards
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ProductDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ProductDto'
      responses:
        '200':
          description: OK
  '/api/cards/products/{id}':
    get:
      tags:
        - Cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /api/cards/accounts:
    get:
      tags:
        - Cards
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
    post:
      tags:
        - Cards
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountDto'
          text/json:
            schema:
              $ref: '#/components/schemas/AccountDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/AccountDto'
      responses:
        '200':
          description: OK
  '/api/cards/accounts/{id}':
    get:
      tags:
        - Cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/cards/accounts/{id}/timeline':
    get:
      tags:
        - Cards
      summary: Ledger + ingest events for operator traceability (simulation ledger — not issuer authoritative).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: take
          in: query
          schema:
            type: integer
            format: int32
            default: 40
      responses:
        '200':
          description: OK
  '/api/cards/accounts/{id}/adjust-balance':
    post:
      tags:
        - Cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustDto'
          text/json:
            schema:
              $ref: '#/components/schemas/AdjustDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/AdjustDto'
      responses:
        '200':
          description: OK
  /api/cards/read-events:
    post:
      tags:
        - Cards
      summary: Preserves unknown protocol payloads verbatim — do not strip unrecognized keys.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardReadEventDto'
          text/json:
            schema:
              $ref: '#/components/schemas/CardReadEventDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CardReadEventDto'
      responses:
        '200':
          description: OK
  /api/cards/transactions:
    post:
      tags:
        - Cards
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentTransactionDto'
          text/json:
            schema:
              $ref: '#/components/schemas/PaymentTransactionDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/PaymentTransactionDto'
      responses:
        '200':
          description: OK
    get:
      tags:
        - Cards
      parameters:
        - name: cardAccountId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
  /api/cards/reconciliation-batches:
    get:
      tags:
        - Cards
      summary: Recent reconciliation batches for operator UI — newest first.
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
    post:
      tags:
        - Cards
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationBatchCreateDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ReconciliationBatchCreateDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ReconciliationBatchCreateDto'
      responses:
        '200':
          description: OK
  '/api/cards/reconciliation-batches/{id}':
    get:
      tags:
        - Cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/cards/reconciliation-batches/{id}/post':
    post:
      tags:
        - Cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/cards/reconciliation-batches/{id}/close':
    post:
      tags:
        - Cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationCloseDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ReconciliationCloseDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ReconciliationCloseDto'
      responses:
        '200':
          description: OK
  '/api/cards/reconciliation-batches/{id}/exception':
    post:
      tags:
        - Cards
      summary: Marks batch Exception when reconciliation cannot be settled — destructive operator action; detail semantics HARDWARE_VALIDATION_REQUIRED for production settlement engines.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationExceptionDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ReconciliationExceptionDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ReconciliationExceptionDto'
      responses:
        '200':
          description: OK
  /api/cards/write-events:
    post:
      tags:
        - Cards
      summary: Physical card writes are simulated only — never executes issuer personalization without HARDWARE_VALIDATION_REQUIRED.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardWriteEventDto'
          text/json:
            schema:
              $ref: '#/components/schemas/CardWriteEventDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CardWriteEventDto'
      responses:
        '200':
          description: OK
  /api/craft/command-types:
    get:
      tags:
        - Craft
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
  /api/craft/sessions:
    get:
      tags:
        - Craft
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
    post:
      tags:
        - Craft
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionDto'
          text/json:
            schema:
              $ref: '#/components/schemas/SessionDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/SessionDto'
      responses:
        '200':
          description: OK
  '/api/craft/sessions/{id}':
    get:
      tags:
        - Craft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/craft/sessions/{id}/commands':
    post:
      tags:
        - Craft
      summary: Enqueues a craft command. body.RequestHex is decoded to raw bytes stored in HostPlatform.Domain.CraftCommand.RequestRaw without semantic interpretation (opaque payload preservation).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandDto'
          text/json:
            schema:
              $ref: '#/components/schemas/CommandDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CommandDto'
      responses:
        '200':
          description: OK
  '/api/craft/commands/{id}/simulate':
    post:
      tags:
        - Craft
      summary: Runs host simulation stub for a deferred Queued command. Writes HostPlatform.Domain.CraftAuditEvent and `ApiAudit` (`craft` / `command_simulated_complete`). Live modem execution remains HARDWARE_VALIDATION_REQUIRED.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/craft/commands/{id}':
    get:
      tags:
        - Craft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/craft/commands/{id}/cancel':
    post:
      tags:
        - Craft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelCommandDto'
          text/json:
            schema:
              $ref: '#/components/schemas/CancelCommandDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CancelCommandDto'
      responses:
        '200':
          description: OK
  /api/customers:
    get:
      tags:
        - Customers
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
    post:
      tags:
        - Customers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
          text/json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
      responses:
        '200':
          description: OK
  '/api/customers/{id}':
    get:
      tags:
        - Customers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    put:
      tags:
        - Customers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
          text/json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
      responses:
        '200':
          description: OK
  /api/dlog/message-types:
    get:
      tags:
        - Dlog
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
  /api/dlog/messages:
    get:
      tags:
        - Dlog
      summary: Legacy alias — prefer `/api/dlog/message-types`.
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema: { }
            application/json:
              schema: { }
            text/json:
              schema: { }
  /api/dlog/transactions:
    get:
      tags:
        - Dlog
      parameters:
        - name: terminalId
          in: query
          schema:
            type: string
            format: uuid
        - name: messageType
          in: query
          schema:
            type: integer
            format: int32
        - name: direction
          in: query
          schema:
            type: integer
            format: int32
        - name: processingStatus
          in: query
          schema:
            type: integer
            format: int32
        - name: fromUtc
          in: query
          schema:
            type: string
            format: date-time
        - name: toUtc
          in: query
          schema:
            type: string
            format: date-time
        - name: sessionCorrelationId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
  '/api/dlog/transactions/{id}':
    get:
      tags:
        - Dlog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/dlog/transactions/{id}/payload':
    get:
      tags:
        - Dlog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
            text/json:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/dlog/transactions/ingest:
    post:
      tags:
        - Dlog
      summary: "Ingests a DLOG record; raw body.RawPayloadHex.RawPayloadHex is stored verbatim (unknown MTs are retained).\r\nWrites an audit event on successful create."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestDto'
          text/json:
            schema:
              $ref: '#/components/schemas/IngestDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/IngestDto'
      responses:
        '201':
          description: Created
        '200':
          description: OK
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/dlog/replay:
    post:
      tags:
        - Dlog
      summary: Exports concatenated raw DLOG payloads for lab replay. Requires explicit confirmation (sensitive data).
      parameters:
        - name: confirm
          in: query
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplayFilterDto'
          text/json:
            schema:
              $ref: '#/components/schemas/ReplayFilterDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ReplayFilterDto'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/DlogReplayResult'
            application/json:
              schema:
                $ref: '#/components/schemas/DlogReplayResult'
            text/json:
              schema:
                $ref: '#/components/schemas/DlogReplayResult'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/dlog/decode:
    post:
      tags:
        - Dlog
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecodeDto'
          text/json:
            schema:
              $ref: '#/components/schemas/DecodeDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/DecodeDto'
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/downloads:
    get:
      tags:
        - Downloads
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
  '/api/downloads/{id}':
    get:
      tags:
        - Downloads
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  '/api/downloads/{id}/cancel':
    post:
      tags:
        - Downloads
      summary: Cancels an in-flight orchestration batch. Requires `?confirm=true`. Writes an audit event.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: confirm
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
  '/api/downloads/{id}/retry':
    post:
      tags:
        - Downloads
      summary: Queues a replacement batch after failure/cancel. Requires `?confirm=true`. Writes an audit event.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: confirm
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
  /api/firmware/execution-policy:
    get:
      tags:
        - Firmware
      summary: UI / operators — surface whether live modem flashing is enabled (default false).
      responses:
        '200':
          description: OK
  /api/firmware/packages:
    get:
      tags:
        - Firmware
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
    post:
      tags:
        - Firmware
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageDto'
          text/json:
            schema:
              $ref: '#/components/schemas/PackageDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/PackageDto'
      responses:
        '200':
          description: OK
  /api/firmware/versions:
    get:
      tags:
        - Firmware
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items: { }
            application/json:
              schema:
                type: array
                items: { }
            text/json:
              schema:
                type: array
                items: { }
    post:
      tags:
        - Firmware
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirmwareVersionCreateDto'
          text/json:
            schema:
              $ref: '#/components/schemas/FirmwareVersionCreateDto'
          application/*+json:
            schema:
              $ref: '#/components/schemas/FirmwareVersionCreateDto'
      responses:
        '200':
          description: OK
  '/api/firmware/packages/{id}':
    get:
