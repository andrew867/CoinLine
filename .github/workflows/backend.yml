name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: dotnet build + test (.NET 9)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/**/packages.lock.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore HostPlatform.sln

      - name: Build solution
        run: dotnet build HostPlatform.sln --configuration Release --no-restore

      - name: Test (all projects)
        run: >-
          dotnet test HostPlatform.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --logger "console;verbosity=normal"
          --results-directory ./TestResults
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: "1"
          DOTNET_NOLOGO: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/TestResults/**/*.trx
          if-no-files-found: ignore
          retention-days: 14
